<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TeleCoin</title>

  <link rel="stylesheet" href="/games/tlc/ui.css">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <main class="game">

    <section class="header-card">
      <div class="game-title">🪙 TeleCoin</div>
    </section>

    <section class="card scan-card">
      <div class="card-title">破譯</div>

      <div class="current-code" id="current-code">0000</div>

      <div class="status" id="status-text">初始化中</div>
    </section>

    <section class="card asset-card">
      <div class="asset-row">
        <span>目前持有</span>
        <strong id="tlc-amount">0 TLC</strong>
      </div>

      <div class="asset-row">
        <span>嘗試次數</span>
        <strong id="try-count">0</strong>
      </div>
    </section>

    <section class="card history-card">
      <div class="card-title">歷史紀錄</div>

      <div class="history-list" id="history-list">
        <div class="history-empty">尚無命中紀錄</div>
      </div>
    </section>

    <section class="actions">
      <button class="main-btn" id="start-btn">開始 TLC</button>
      <button class="sub-btn" id="stop-btn">停止</button>
    </section>

  </main>

  <script src="/games/tlc/ui.js"></script>
</body>
</html>
